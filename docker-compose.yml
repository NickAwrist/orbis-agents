services:
  agents:
    image: oven/bun:1
    working_dir: /app
    env_file:
      - path: .env
        required: false
    command: sh -c "bun install --frozen-lockfile && bun run build && AGENTS_BACKEND_HOST=0.0.0.0 bun run start"
    ports:
      - "${AGENTS_BACKEND_PORT:-3000}:${AGENTS_BACKEND_PORT:-3000}"
    volumes:
      - .:/app
      - agents-node-modules:/app/node_modules
      - agents-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  agents-node-modules:
  agents-data:
