services:
  agents:
    image: oven/bun:1
    working_dir: /app
    env_file:
      - path: .env
        required: false
    environment:
      AGENTS_BACKEND_HOST: 0.0.0.0
      AGENTS_BACKEND_PORT: ${AGENTS_BACKEND_PORT:-3000}
    command: sh -c "bun install --frozen-lockfile && bun run build && bun run start"
    network_mode: host
    volumes:
      - .:/app
      - agents-node-modules:/app/node_modules
      - agents-data:/app/data

volumes:
  agents-node-modules:
  agents-data:
